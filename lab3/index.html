<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title> Sign Up Page </title>

    <!-- Links the HTML page to the external CSS file -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font: Pacifico -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <!-- Google Font: Josefin Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">

        <!-- LEFT SIDE: Sign Up Image -->
        <div class="left-panel">
            <img src="img/signup.png" alt="Sign Up">
        </div>

        <!-- RIGHT SIDE: Sign Up Form -->
        <div class="right-panel">
            <h1> Sign Up</h1>
            <p>Create an account, it's free</p>
            <form id="signupForm" action="welcome.html">
                <label> First Name:
                    <input type="text" id="fName" name="fName"><br>
                </label>

                <label>Last Name:
                    <input type="text" id="lName" name="lName"><br>
                </label>

                Gender:
                <label><input type="radio" name="gender" value="m"> Male</label>
                <label><input type="radio" name="gender" value="f"> Female</label><br><br>

                <label>Zip Code:
                    <input type="text" id="zip" name="zip">
                    <span id="zipError"></span><br>
                </label>

                <div class="location-info">

                    <div class="city">
                        City: <span id="city"></span>
                    </div>

                    <div class="coordinates">
                        <div>
                            Latitude: <span id="latitude"></span>
                        </div>

                        <div>
                            Longitude: <span id="longitude"></span>
                        </div>
                    </div>
                </div>

                <label>State:
                    <select id="state" name="state">
                        <option value="">Loading states...</option>
                    </select><br>
                </label>

                <label>Select a County:
                    <select id="county" name="county"></select><br>
                </label>

                <label>Desired Username:
                    <input type="text" id="username" name="username">
                </label>
                <span id="usernameError"></span><br>

                <label>Password:
                    <input type="password" id="password" name="password">
                    <span id="suggestedPassword"></span><br>
                </label>

                <label>Type Password Again:
                    <input type="password" id="passwordAgain" name="passwordAgain"><br>
                </label>
                <span id="passwordError"></span><br>

                <button>Sign up!</button>
            </form>
        </div>

    </div>

    <!--Link the JavaScript to the HTML file -->
    <script src="js/script.js"></script>
</body>

</html>
